<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body,html{
            height: 100vh;
            box-sizing: border-box;
            margin: 0;
            padding: 0;

        }
        .container{
            position: relative;
            width: 80%;
            height: 80%;
            margin: auto; ;
            border: 10px solid black;
            box-sizing: border-box;
            transform-style: preserve-3d;
            perspective: 1000px;
            background-color:#a9a9a9;
        }
        .eixoX, .eixoY, .eixoZ{
            position: absolute;
            width: 100%;
            height: 100%;
            border: 10px solid rgb(0, 0, 0);
            box-sizing: border-box;
            transform-style: preserve-3d;

        }
        .eixoX{
            transform: rotateY(90deg);
        }
        .eixoY{
            transform: rotateY(90deg);
        }
        .eixoZ{
            transform: rotateZ(90deg);
        }

    </style>
</head>
<body>
    
<h1>Cube3D</h1>

<div class="container">
    <div class="eixoX"></div>
    <div class="eixoY"></div>
    <div class="eixoZ"></div>
    <div class="cubo"></div>
</div>


    
</body>
</html>
