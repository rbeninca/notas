<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizador de Plano de Ensino</title>

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #f8fafc;
    padding: 32px;
}

.markdown-body {
    max-width: 980px;
    margin: auto;
    background: white;
    padding: 32px;
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

/*Estilização tabela*



/* ===== CALENDÁRIO ===== */

.day-cell {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    position: relative;
    font-size: 0.875rem;
    transition: all 0.2s ease;
}

.day-cell.marked {
    background-color: #6366f1;
    color: white;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 4px rgba(99, 102, 241, 0.3);
}

.day-cell.marked:hover {
    background-color: #4f46e5; /* Indigo 600 */
    transform: scale(1.05);
}

/* Eventos Passados (Cor clarinha apagada) */
.day-cell.marked.past {
    background-color: #e2e8f0; /* Fundo cinza/azulado bem claro */
    color: #64748b; /* Texto cinza médio/apagado */
    font-weight: 400; /* Tira o negrito */
    box-shadow: none; /* Tira a sombra para dar aspecto inativo */
}

.day-cell.marked.past:hover {
    background-color: #cbd5e1; /* Fica um pouco mais escuro no hover */
}

/* Linha da Tabela Destacada ao clicar */
.markdown-body table tr.highlighted-row {
    background-color: #fef08a !important; /* Amarelo claro (yellow-200) do Tailwind */
    transition: background-color 0.5s ease;
}
/* Linha da Tabela referente ao DIA DE HOJE */
.markdown-body table tr.today-row {
  background-color: #fef9c3 !important; /* amarelo bem claro */
  outline: 2px solid #facc15;           /* amarelo mais forte */
  outline-offset: -2px;
}


/* ===== TOOLTIP ===== */

.day-cell[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%);
    background: #1f2937;
    color: #fff;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    white-space: pre-line;
    width: max-content;
    max-width: 280px;
    z-index: 50;
    box-shadow: 0 10px 20px rgba(0,0,0,.25);
    font-weight: normal;
}

.day-cell[data-tooltip]:hover::before {
    content: '';
    position: absolute;
    bottom: 105%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #1f2937;
}
/* Dia de hoje no calendário (mesmo sem evento) */
.day-cell.today {
  background-color: #fef08a; /* yellow-200 */
  color: #92400e;            /* tom âmbar pro texto */
  font-weight: 700;
  box-shadow: 0 2px 6px rgba(250, 204, 21, 0.35);
}

/* Se HOJE também tiver evento, mantém “cara de evento” mas com borda amarela */
.day-cell.marked.today {
  outline: 3px solid #facc15;
  outline-offset: 2px;
}

.day-cell.today {
  position: relative;
}

.day-cell.today::after {
  content: "HOJE";
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.06em;
  padding: 2px 6px;
  border-radius: 999px;
  background: #facc15;   /* amarelo forte */
  color: #111827;        /* quase preto */
  box-shadow: 0 2px 6px rgba(0,0,0,.12);
  pointer-events: none;
}

/* ===== INDICATIVO "HOJE" NA TABELA ===== */
/* Coloca o "HOJE" no 1º td da linha (aula/índice) */
.markdown-body table tr.today-row td:first-child {
  position: relative;
  padding-right: 64px; /* abre espaço pro selo */
}

.markdown-body table tr.today-row td:first-child::after {
  content: "HOJE";
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  border-radius: 999px;
  background: #facc15;
  color: #111827;
  pointer-events: none;
}

/* ===== LAYOUT DINÂMICO: TABELA + CALENDÁRIO ===== */
.planejamento-wrap {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.planejamento-table {
    flex: 1 1 auto;
    min-width: 0;
}

.planejamento-calendar {
    flex: 0 0 auto;
    min-width: 0;
}

.planejamento-wrap.side-floating .planejamento-calendar {
    position: fixed;
    top: var(--calendar-top, 16px);
    left: var(--calendar-left, auto);
    width: 340px;
    max-height: calc(100vh - 32px);
    overflow: auto;
    z-index: 30;
}

.calendar-months-grid {
    display: grid;
    grid-template-columns: repeat(1, minmax(0, 1fr));
    gap: 1rem;
    margin: 1.5rem 0;
}

@media (min-width: 768px) {
    .calendar-months-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
}

@media (min-width: 1200px) {
    .calendar-months-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
    }
}

.planejamento-wrap.side-floating .calendar-months-grid {
    grid-template-columns: 1fr;
    margin: 0;
}

</style>
</head>

<body>

<div id="output" class="markdown-body">
    Carregando planejamento...
</div>

<script>
const params = new URLSearchParams(window.location.search);
const arquivoMD = params.get('p');
const output = document.getElementById('output');
let _layoutSetupDone = false;
let _resizeTimer = null;

function setupPlanningLayoutOnce() {
    if (_layoutSetupDone) return;

    const calendarHost = document.getElementById("calendario-presencial");
    const table = output.querySelector("table");
    if (!calendarHost || !table) return;

    const wrap = document.createElement("div");
    wrap.className = "planejamento-wrap";

    const tableSlot = document.createElement("div");
    tableSlot.className = "planejamento-table";

    const calendarSlot = document.createElement("div");
    calendarSlot.className = "planejamento-calendar";

    table.parentNode.insertBefore(wrap, table);

    tableSlot.appendChild(table);
    wrap.appendChild(tableSlot);

    calendarSlot.appendChild(calendarHost);
    wrap.appendChild(calendarSlot);

    _layoutSetupDone = true;
}

function applyPlanningLayout() {
    const wrap = output.querySelector(".planejamento-wrap");
    if (!wrap) return;

    const tableSlot = wrap.querySelector(".planejamento-table");
    const tableEl = tableSlot ? tableSlot.querySelector("table") : null;
    const calendarSlot = wrap.querySelector(".planejamento-calendar");
    if (!tableSlot || !tableEl || !calendarSlot) return;

    const monthWidth = 340;
    const gapPx = 16;
    const viewportPadding = 16;
    const outputRect = output.getBoundingClientRect();
    const fitsOutside = (outputRect.right + gapPx + monthWidth + viewportPadding) <= window.innerWidth;

    if (fitsOutside) {
        wrap.classList.add("side-floating");
        wrap.style.setProperty("--calendar-left", `${Math.round(outputRect.right + gapPx)}px`);
        wrap.style.setProperty("--calendar-top", `${Math.max(16, Math.round(outputRect.top))}px`);
    } else {
        wrap.classList.remove("side-floating");
        wrap.style.removeProperty("--calendar-left");
        wrap.style.removeProperty("--calendar-top");
    }
}

window.addEventListener("resize", () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(applyPlanningLayout, 80);
});

// Configuração de ambiente para demonstração (Caso não tenha o parâmetro ?p)
if (arquivoMD ==="teste") {
    output.innerHTML = `
        <h2>Instruções</h2>
        <p>Acesse a URL passando o parâmetro <code>?p=arquivo.md</code></p>
        <p><em>Exemplo de tabela esperada no Markdown:</em></p>
        <table id="tabela-exemplo">
            <tr><td>1</td><td>Apresentação da disciplina</td><td>2h</td><td>20/02/2026</td></tr>
            <tr><td>2</td><td>Introdução aos conceitos</td><td>2h</td><td>27/02/2026</td></tr>
            <tr><td>3</td><td>Prática de laboratório</td><td>4h</td><td>06/03/2026</td></tr>
            <tr><td>4</td><td>Avaliação Parcial</td><td>2h</td><td>13/03/2026</td></tr>
        </table>
        <div id="calendario-presencial"></div>
    `;
    // Força o processamento do calendário na tabela de exemplo apenas para demonstração visual
    setTimeout(processCalendar, 100); 
} else {
    // Fluxo normal de produção
const basePath = window.location.pathname.replace('view-planejamento.html', 'planejamentos/');
const urlMD = `${window.location.origin}${basePath}${arquivoMD}`;

fetch(urlMD)
    .then(r => r.text())
    .then(md => {
        output.innerHTML = marked.parse(md);
        processCalendar();
    })
    .catch(() => {
        output.innerHTML = "<p>Erro ao carregar o planejamento.</p>";
    });
}
function getTodayISO() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`;
}
/* ================================
   EXTRAÇÃO DOS DADOS DA TABELA
================================ */

function extractEventsFromTable() {
    const events = {};
    const rows = output.querySelectorAll("table tr");

    rows.forEach(row => {
        const cells = row.querySelectorAll("td");
        if (cells.length >= 4) {
            const aula = cells[0].innerText.trim();
            const conteudo = cells[1].innerText.trim();
            const carga = cells[2].innerText.trim();
            const rawDate = cells[3].innerText.trim();

            const match = rawDate.match(/(\d{2})\/(\d{2})\/(\d{4})/);
            if (match) {
                const [ , d, m, y ] = match;
                const iso = `${y}-${m}-${d}`;

                // Adiciona o atributo data-date na linha para podermos encontrá-la no clique
                row.setAttribute('data-date', iso);
                //marca a linha "hoje " na tabela 
                const todayISO = getTodayISO();
                if (iso === todayISO) {
                  row.classList.add("today-row");
                }


                events[iso] = {
                    aula,
                    conteudo,
                    carga,
                    rawDate
                };
            }
        }
    });

    return events;
}

/* ================================
   RENDERIZAÇÃO DO CALENDÁRIO
================================ */

function renderMonth(yearMonth, events) {
    const [y, m] = yearMonth.split('-').map(Number);
    const firstDay = new Date(y, m - 1, 1).getDay();
    const lastDay = new Date(y, m, 0).getDate();
    const monthName = new Intl.DateTimeFormat('pt-BR', { month: 'long' })
        .format(new Date(y, m - 1, 1));

    // Capturando a data de HOJE no formato YYYY-MM-DD
    const today = new Date();
    //const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    const todayStr = getTodayISO();

    let html = `
    <div class="calendar-month-card bg-white rounded-xl border border-gray-100 p-4">
        <h3 class="text-center font-semibold capitalize mb-3 text-gray-800">${monthName} ${y}</h3>
        <div class="grid grid-cols-7 text-xs text-center mb-2 font-medium text-gray-400">
            <div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div>
            <div>QUI</div><div>SEX</div><div>SÁB</div>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center">
    `;

    for (let i = 0; i < firstDay; i++) html += `<div></div>`;

    for (let d = 1; d <= lastDay; d++) {
        const date = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let cls = "day-cell text-gray-700";
        let tooltip = "";
        if (date === todayStr) {
         cls += " today";
}

        if (events[date]) {
            cls += " marked";
            
            // VERIFICAÇÃO DE EVENTO PASSADO:
            // Se a data do calendário for menor que a data de hoje
            if (date < todayStr) {
                cls += " past";
            }

            const e = events[date];
            tooltip = `
Aula ${e.aula}
${e.conteudo}
Carga horária: ${e.carga}
Data: ${e.rawDate}
            `.trim();
        }

        // Adiciona o evento de clique onclick="highlightRow('${date}')" caso seja um dia marcado
        const clickEvent = events[date] ? `onclick="highlightRow('${date}')"` : "";

        html += `<div class="${cls}" ${clickEvent} ${tooltip ? `data-tooltip="${tooltip}"` : ""}>${d}</div>`;
    }

    html += `</div></div>`;
    return html;
}

/* ================================
   INJEÇÃO NO PONTO DO MD
================================ */

function processCalendar() {
    const container = document.getElementById("calendario-presencial");
    if (!container) return;

    const events = extractEventsFromTable();
    const months = [...new Set(Object.keys(events).map(d => d.slice(0,7)))].sort();

    let html = `<div class="calendar-months-grid">`;
    months.forEach(m => html += renderMonth(m, events));
    html += `</div>`;

    container.innerHTML = html;
    setupPlanningLayoutOnce();
    applyPlanningLayout();
}

/* ================================
   INTERAÇÃO DE CLIQUE
================================ */

function highlightRow(date) {
    // Remove o destaque de linhas anteriormente clicadas
    const prev = document.querySelectorAll('.highlighted-row');
    prev.forEach(row => row.classList.remove('highlighted-row'));

    // Busca a linha que tem o data-date igual ao clicado
    const targetRow = document.querySelector(`tr[data-date="${date}"]`);
    
    if (targetRow) {
        // Adiciona a classe de destaque
        targetRow.classList.add('highlighted-row');
        
        // Faz o scroll suave até a tabela para o usuário visualizar
        targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}
</script>

</body>
</html>
