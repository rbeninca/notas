<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Plano de Ensino</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #facc15;
        }

        body {
            background: #f1f5f9;
            padding-top: 70px;
        }

        .header-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid #e2e8f0;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Layout de Colunas Lado a Lado */
        .main-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: auto;
        }

        @media (min-width: 1024px) {
            .main-container {
                flex-direction: row;
                align-items: flex-start;
            }
            .content-area {
                flex: 1;
                min-width: 0; /* Evita quebra de layout com tabelas largas */
            }
            .sidebar-area {
                width: 380px;
                position: sticky;
                top: 90px;
                max-height: calc(100vh - 120px);
                overflow-y: auto;
                padding-right: 5px;
            }
        }

        .markdown-body {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Melhoria nas tabelas */
        .markdown-body table {
            display: table;
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        /* Estilo das Células do Calendário */
        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            position: relative;
            font-size: 0.75rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            cursor: default;
        }

        .day-cell.marked {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .day-cell.marked:hover {
            background-color: var(--primary-dark);
            transform: scale(1.1);
        }

        .day-cell.marked.past {
            background-color: #f1f5f9;
            color: #94a3b8;
        }

        .day-cell.today {
            border: 2px solid var(--accent);
            font-weight: bold;
        }

        /* Destaque de Linha */
        .markdown-body table tr.highlighted-row {
            background-color: #fef9c3 !important;
            outline: 2px solid var(--accent);
        }

        .today-badge {
            background: #3b82f6;
            color: white;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 9px;
            margin-left: 5px;
        }

        /* Tooltip minimalista para a sidebar */
        .sidebar-area .day-cell[data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 110%;
            right: 0;
            background: #1e293b;
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            width: 180px;
            z-index: 110;
            white-space: pre-line;
        }

        /* Scrollbar customizada para a sidebar */
        .sidebar-area::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <nav class="header-nav shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-indigo-600 font-bold text-lg">📅 Planner</span>
            <span id="file-title" class="text-gray-400 text-sm hidden sm:inline border-l pl-3 ml-1"></span>
        </div>
        <div class="flex gap-2 text-xs">
            <span id="today-display" class="bg-gray-100 px-3 py-1.5 rounded-full text-gray-600 font-medium"></span>
        </div>
    </nav>

    <main class="main-container">
        <!-- ÁREA DO CONTEÚDO (ESQUERDA) -->
        <div class="content-area">
            <div id="output" class="markdown-body">
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600"></div>
                </div>
            </div>
        </div>

        <!-- ÁREA DO CALENDÁRIO (DIREITA) -->
        <aside class="sidebar-area">
            <div id="calendario-container" class="space-y-4">
                <!-- Injetado via JS -->
            </div>
        </aside>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const arquivoMD = params.get('p');
        const output = document.getElementById('output');
        const calContainer = document.getElementById('calendario-container');
        const fileTitleEl = document.getElementById('file-title');
        
        // Exibe data de hoje no topo
        document.getElementById('today-display').innerText = new Intl.DateTimeFormat('pt-BR', { dateStyle: 'long' }).format(new Date());

        if (!arquivoMD) {
            output.innerHTML = `<div class="p-10 text-center text-gray-500">Aguardando parâmetro ?p=arquivo.md</div>`;
        } else {
            const urlMD = arquivoMD.startsWith('http') ? arquivoMD : `./planejamentos/${arquivoMD}`;
            fileTitleEl.innerText = arquivoMD;

            fetch(urlMD)
                .then(r => r.text())
                .then(md => {
                    output.innerHTML = marked.parse(md);
                    processCalendar();
                })
                .catch(() => {
                    output.innerHTML = `<div class="p-10 text-red-500">Erro ao carregar planejamento.</div>`;
                });
        }

        function getTodayISO() {
            const t = new Date();
            return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`;
        }

        function extractEventsFromTable() {
            const events = {};
            const rows = output.querySelectorAll("table tr");
            const todayISO = getTodayISO();

            rows.forEach(row => {
                const cells = row.querySelectorAll("td");
                if (cells.length >= 4) {
                    const aula = cells[0].innerText.trim();
                    const conteudo = cells[1].innerText.trim();
                    const rawDate = cells[3].innerText.trim();
                    const match = rawDate.match(/(\d{2})\/(\d{2})\/(\d{4})/);
                    
                    if (match) {
                        const [, d, m, y] = match;
                        const iso = `${y}-${m}-${d}`;
                        row.setAttribute('data-date', iso);

                        if (iso === todayISO) {
                            row.classList.add("today-row");
                            cells[0].innerHTML += `<span class="today-badge">HOJE</span>`;
                        }

                        events[iso] = {
                            aula: aula.split('.')[0].replace(/\D/g, ''),
                            resumo: conteudo.substring(0, 60) + "...",
                            rawDate
                        };
                    }
                }
            });
            return events;
        }

        function renderMonth(yearMonth, events) {
            const [y, m] = yearMonth.split('-').map(Number);
            const firstDay = new Date(y, m - 1, 1).getDay();
            const lastDay = new Date(y, m, 0).getDate();
            const monthName = new Intl.DateTimeFormat('pt-BR', { month: 'short' }).format(new Date(y, m - 1, 1));
            const todayStr = getTodayISO();

            let html = `
            <div class="bg-white rounded-xl border border-gray-100 p-4 shadow-sm">
                <h4 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-3 flex justify-between">
                    <span>${monthName}</span> <span>${y}</span>
                </h4>
                <div class="grid grid-cols-7 text-[9px] text-center mb-2 font-bold text-gray-300">
                    <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center">
            `;

            for (let i = 0; i < firstDay; i++) html += `<div></div>`;

            for (let d = 1; d <= lastDay; d++) {
                const date = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                let cls = "day-cell";
                let attr = "";

                if (date === todayStr) cls += " today";

                if (events[date]) {
                    cls += " marked";
                    if (date < todayStr) cls += " past";
                    const e = events[date];
                    attr = `onclick="highlightRow('${date}')" data-tooltip="Aula ${e.aula}: ${e.resumo}"`;
                }

                html += `<div class="${cls}" ${attr}>${d}</div>`;
            }

            html += `</div></div>`;
            return html;
        }

        function processCalendar() {
            // Busca o local original no MD para remover e mover para a lateral
            const originalAnchor = document.getElementById("calendario-presencial");
            if (originalAnchor) originalAnchor.style.display = 'none';

            const events = extractEventsFromTable();
            const months = [...new Set(Object.keys(events).map(d => d.slice(0, 7)))].sort();

            let calHtml = `<div class="text-sm font-bold text-gray-700 mb-2 px-1">Encontros</div>`;
            months.forEach(m => calHtml += renderMonth(m, events));
            
            calContainer.innerHTML = calHtml;
        }

        function highlightRow(date) {
            document.querySelectorAll('.highlighted-row').forEach(row => row.classList.remove('highlighted-row'));
            const targetRow = document.querySelector(`tr[data-date="${date}"]`);
            
            if (targetRow) {
                targetRow.classList.add('highlighted-row');
                targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
