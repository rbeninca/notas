<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizador de Plano de Ensino</title>

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #f8fafc;
    padding: 32px;
}

.markdown-body {
    max-width: 980px;
    margin: auto;
    background: white;
    padding: 32px;
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

/* ===== CALENDÁRIO ===== */
.day-cell {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    position: relative;
    font-size: 0.875rem;
    transition: all 0.2s ease;
}

.day-cell.marked {
    background-color: #6366f1;
    color: white;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 4px rgba(99, 102, 241, 0.3);
}

.day-cell.marked:hover {
    transform: scale(1.08);
    background-color: #4f46e5;
}

.tooltip {
  position: absolute;
  bottom: 110%;
  left: 50%;
  transform: translateX(-50%);
  background: #111827;
  color: white;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 0.75rem;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 50;
}

.day-cell.marked:hover .tooltip {
  opacity: 1;
}

.tooltip::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border-width: 6px;
  border-style: solid;
  border-color: #111827 transparent transparent transparent;
}

/* Tipos */
.tooltip.presencial {
  background: #4f46e5;
}

.tooltip.ead {
  background: #facc15;
  color: #111827;
  pointer-events: none;
}

/* ===== Feature pedida: calendário ao lado quando COUBER (sem mudar aparência) ===== */
.planejamento-wrap{
  display:flex;
  flex-direction: column; /* padrão: calendário embaixo */
  gap: 1.5rem;           /* equivalente ao gap-6 */
}
.planejamento-wrap.side-by-side{
  flex-direction: row;   /* quando couber: ao lado */
  align-items: flex-start;
}
.planejamento-table{
  flex: 1 1 auto;
  min-width: 0;
}
.planejamento-calendar{
  flex: 0 0 auto;
  min-width: 360px;
}
</style>
</head>

<body>

<div id="output" class="markdown-body">
    Carregando planejamento...
</div>

<script>
const params = new URLSearchParams(window.location.search);
const arquivoMD = params.get('p');
const output = document.getElementById('output');

// ================================
//   LAYOUT RESPONSIVO POR "CABIMENTO"
// ================================
let _layoutSetupDone = false;

function setupPlanningLayoutOnce() {
  if (_layoutSetupDone) return;

  const calendarHost = document.getElementById("calendario-presencial");
  const table = output.querySelector("table");
  if (!calendarHost || !table) return;

  const wrap = document.createElement("div");
  wrap.className = "planejamento-wrap";

  const tableSlot = document.createElement("div");
  tableSlot.className = "planejamento-table";

  const calSlot = document.createElement("div");
  calSlot.className = "planejamento-calendar";

  table.parentNode.insertBefore(wrap, table);

  tableSlot.appendChild(table);
  wrap.appendChild(tableSlot);

  calSlot.appendChild(calendarHost);
  wrap.appendChild(calSlot);

  _layoutSetupDone = true;
  requestAnimationFrame(applyPlanningLayout);
}

function applyPlanningLayout() {
  const wrap = output.querySelector(".planejamento-wrap");
  if (!wrap) return;

  const tableSlot = wrap.querySelector(".planejamento-table");
  const calSlot = wrap.querySelector(".planejamento-calendar");
  if (!tableSlot || !calSlot) return;

  const wideEnough = window.innerWidth >= 1400;

  const gapPx = 24; // ~ gap-6
  const needed = tableSlot.scrollWidth + calSlot.offsetWidth + gapPx;
  const available = output.clientWidth;

  if (wideEnough && needed <= available) {
    wrap.classList.add("side-by-side");
  } else {
    wrap.classList.remove("side-by-side");
  }
}

let _resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(applyPlanningLayout, 80);
});

// ================================
//   UTIL
// ================================
function escapeHTML(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function getTodayISO() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`;
}

// ================================
//   EXTRAÇÃO DOS DADOS DA TABELA
// ================================
function extractEventsFromTable() {
    const events = {};
    const rows = output.querySelectorAll("table tr");

    rows.forEach(row => {
        const cells = row.querySelectorAll("td");
        if (cells.length >= 4) {
            const aula = cells[0].innerText.trim();
            const conteudo = cells[1].innerText.trim();
            const carga = cells[2].innerText.trim();
            const rawDate = cells[3].innerText.trim();

            const match = rawDate.match(/(\d{2})\/(\d{2})\/(\d{4})/);
            if (!match) return;

            const [_, dd, mm, yyyy] = match;
            const isoDate = `${yyyy}-${mm}-${dd}`;

            if (!events[isoDate]) events[isoDate] = [];
            events[isoDate].push({ aula, conteudo, carga });
        }
    });

    return events;
}

// ================================
//   RENDERIZAÇÃO DO CALENDÁRIO
// ================================
function renderMonth(month, events) {
    const [year, m] = month.split("-").map(Number);
    const firstDay = new Date(year, m - 1, 1);
    const lastDay = new Date(year, m, 0);
    const startWeekDay = firstDay.getDay();
    const daysInMonth = lastDay.getDate();

    const todayISO = getTodayISO();

    let html = `
      <div class="p-4 border rounded-lg shadow-sm bg-white">
        <h3 class="text-lg font-semibold mb-2">${firstDay.toLocaleString('pt-BR', { month: 'long' })} ${year}</h3>
        <div class="grid grid-cols-7 gap-1 text-center font-semibold text-gray-700 mb-2">
          <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center">
    `;

    for (let i = 0; i < startWeekDay; i++) {
        html += `<div></div>`;
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const dateISO = `${year}-${String(m).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const hasEvent = events[dateISO];
        const isToday = dateISO === todayISO;

        let cellClass = "day-cell";
        if (hasEvent) cellClass += " marked";
        if (isToday) cellClass += " ring-2 ring-offset-2 ring-indigo-400";

        html += `<div class="${cellClass}">`;
        html += day;

        if (hasEvent) {
            const tooltipText = hasEvent.map(e => `${escapeHTML(e.aula)} - ${escapeHTML(e.conteudo)}`).join(" | ");
            html += `<div class="tooltip presencial">${tooltipText}</div>`;
        }

        html += `</div>`;
    }

    html += `
        </div>
      </div>
    `;

    return html;
}

function processCalendar() {
    const container = document.getElementById("calendario-presencial");
    if (!container) return;

    const events = extractEventsFromTable();
    const months = [...new Set(Object.keys(events).map(d => d.slice(0,7)))].sort();

    let html = `<div class="grid md:grid-cols-2 gap-6 my-6">`;
    months.forEach(m => html += renderMonth(m, events));
    html += `</div>`;

    container.innerHTML = html;

    // Feature: posiciona calendário ao lado quando couber
    setupPlanningLayoutOnce();
    applyPlanningLayout();
}

// ================================
//   CARREGAMENTO DO MARKDOWN (FIX 404)
// ================================
async function fetchWithFallbacks(filename){
  // 1) tenta em ./planejamentos/
  // 2) tenta na mesma pasta do html
  const base = new URL(window.location.href);
  const candidates = [
    new URL(`planejamentos/${filename}`, base),
    new URL(filename, base),
  ];

  let lastErr = null;
  for(const url of candidates){
    try{
      const r = await fetch(url.toString(), { cache: "no-store" });
      if(!r.ok) throw new Error(`HTTP ${r.status} (${r.statusText}) em ${url.pathname}`);
      return await r.text();
    }catch(e){
      lastErr = e;
    }
  }
  throw lastErr || new Error("Falha ao carregar o arquivo.");
}

function showHelp(){
  output.innerHTML = `
    <h2>Como usar</h2>
    <p>Abra o arquivo com <code>?p=nome-do-arquivo.md</code>.</p>
    <p>Ex.: <code>view-planejamento2.html?p=ads-ddm-2026-1.md</code></p>

    <h3>Onde colocar o .md</h3>
    <ul>
      <li>Preferencialmente em <code>./planejamentos/</code> (mesma pasta do HTML)</li>
      <li>Ou na mesma pasta do HTML</li>
    </ul>

    <h3>Exemplo de tabela</h3>
    <table>
      <tr><th>Aula</th><th>Conteúdo</th><th>Carga</th><th>Data</th></tr>
      <tr><td>1</td><td>Apresentação</td><td>2h</td><td>20/02/2026</td></tr>
      <tr><td>2</td><td>Introdução aos conceitos</td><td>2h</td><td>27/02/2026</td></tr>
      <tr><td>3</td><td>Prática de laboratório</td><td>4h</td><td>06/03/2026</td></tr>
      <tr><td>4</td><td>Avaliação Parcial</td><td>2h</td><td>13/03/2026</td></tr>
    </table>
    <div id="calendario-presencial"></div>
  `;
  setTimeout(processCalendar, 50);
}

async function main(){
  if(!arquivoMD){
    showHelp();
    return;
  }

  try{
    const md = await fetchWithFallbacks(arquivoMD);
    output.innerHTML = marked.parse(md);

    // Garante que exista o container do calendário (sem mudar aparência)
    if(!document.getElementById("calendario-presencial")){
      output.insertAdjacentHTML("beforeend", `<div id="calendario-presencial"></div>`);
    }

    processCalendar();
  }catch(err){
    output.innerHTML = `
      <p><b>Erro ao carregar o planejamento:</b> ${escapeHTML(err.message)}</p>
      <p>Verifique:</p>
      <ul>
        <li>Se você abriu com <code>?p=arquivo.md</code></li>
        <li>Se o arquivo existe em <code>./planejamentos/</code> ou na mesma pasta do HTML</li>
      </ul>
    `;
  }
}

main();
</script>

</body>
</html>
